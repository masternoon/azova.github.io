<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dermatology Training Program</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #fff;
        color: #2e8375;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 16px 80px;
      }

      h1 {
        font-size: 2rem;
        line-height: 1.3;
        margin-bottom: 12px;
        text-align: center;
      }

      .sub {
        text-align: center;
        color: #4e5264;
        margin-bottom: 24px;
      }

      .video-wrap {
        position: relative;
        padding-top: 56.25%;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      #player {
        position: absolute;
        inset: 0;
      }

      .below {
        text-align: center;
        margin-top: 32px;
        color: #4e5264;
      }

      /* Popup / modal */

      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .modal {
        background: #ffffff;
        color: #0f172a;
        max-width: 420px;
        width: 90%;
        padding: 28px;
        border-radius: 14px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }

      .modal h2 {
        margin-top: 0;
        font-size: 1.4rem;
      }

      .modal p {
        color: #334155;
      }
      .buttons_div {
        text-align: center;
      }
      .cta {
        display: inline-block;
        margin-top: 16px;
        padding: 14px 22px;
        background: #2e8375;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
      }

      .close {
        margin-top: 14px;
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Clinical Dermatology Training Program</h1>

      <div class="sub">
        Advanced, practical training for clinicians who want confidence in real-world dermatology cases.
      </div>

      <div class="video-wrap">
        <div id="player"></div>
      </div>

      <div class="below">Watch the short presentation to see if this program is right for you.</div>
      <div class="buttons_div">
        <a class="cta" href="https://www.azova.com/fellowship/dermatology/masterclass/" target="_blank"> Register </a>
        <a class="cta" href="https://calendly.com/masternoon2/30min" target="_blank"> Book a Call </a>
      </div>
    </div>

    <!-- Popup -->
    <div id="overlay">
      <div class="modal">
        <h2>Book a Call</h2>
        <p>book a call.</p>
        <!-- Calendly inline widget begin -->
        <div
          class="calendly-inline-widget"
          data-url="https://calendly.com/masternoon2/30min"
          style="min-width: 320px; height: 700px"
        ></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        <!-- Calendly inline widget end -->
        <!-- CHANGE THIS LINK to your Systeme.io or checkout page -->
        <br />
        <button class="close" onclick="closePopup()">Continue watching</button>
      </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let player;
      let popupShown = false;

      /* === CONFIGURATION === */

      // Put your YouTube video ID here
      const VIDEO_ID = "GVC8sZZ0giw";

      // Time (in seconds) when the video should pause and popup
      const TRIGGER_TIME = 10;

      /* ===================== */

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          height: "100%",
          width: "100%",
          videoId: VIDEO_ID,
          playerVars: {
            rel: 0,
            modestbranding: 1,
          },
          events: {
            onReady: onPlayerReady,
          },
        });
      }

      function onPlayerReady() {
        setInterval(() => {
          if (!player || popupShown) return;

          const t = player.getCurrentTime();

          if (t >= TRIGGER_TIME) {
            popupShown = true;
            player.pauseVideo();
            openPopup();
          }
        }, 500);
      }

      function openPopup() {
        document.getElementById("overlay").style.display = "flex";
      }

      function closePopup() {
        document.getElementById("overlay").style.display = "none";
        if (player) {
          player.playVideo();
        }
      }
    </script>
  </body>
</html>
